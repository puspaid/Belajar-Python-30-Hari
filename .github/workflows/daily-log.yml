name: Daily Learning Log

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  update-log:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Update learning log
        run: |
          DATE=$(TZ='Asia/Jakarta' date +'%Y-%m-%d')
          TIME=$(TZ='Asia/Jakarta' date +'%H:%M:%S')
          mkdir -p logs
          
          echo "" >> logs/LEARNING_LOG.md
          echo "## 📅 Daily Checkpoint - $DATE" >> logs/LEARNING_LOG.md
          echo "" >> logs/LEARNING_LOG.md
          echo "**Time:** $TIME WIB" >> logs/LEARNING_LOG.md
          echo "**Status:** ✅ Learning maintained" >> logs/LEARNING_LOG.md
          echo "" >> logs/LEARNING_LOG.md
          echo "---" >> logs/LEARNING_LOG.md
      
      - name: Commit changes
        run: |
          git config user.name "Learning Bot"
          git config user.email "action@github.com"
          git add logs/LEARNING_LOG.md
          git diff --quiet && git diff --staged --quiet || git commit -m "📚 Daily checkpoint - $DATE"
      
      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
