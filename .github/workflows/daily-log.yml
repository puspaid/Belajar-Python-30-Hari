name: Daily Learning Log

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  update-log:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Update learning log
        run: |
          DATE=$(TZ='Asia/Jakarta' date +'%Y-%m-%d')
          TIME=$(TZ='Asia/Jakarta' date +'%H:%M:%S')
          mkdir -p logs
          cat >> logs/LEARNING_LOG.md << 'EOF'
          
          ## Daily Checkpoint - $(TZ='Asia/Jakarta' date +'%Y-%m-%d')
          
          **Time:** $(TZ='Asia/Jakarta' date +'%H:%M:%S') WIB  
          **Status:** ✅ Learning maintained  
          
          ---
          
          EOF
      
      - name: Commit changes
        run: |
          git config user.name "Learning Bot"
          git config user.email "action@github.com"
          git add logs/LEARNING_LOG.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily checkpoint - $(TZ='Asia/Jakarta' date +'%Y-%m-%d')"
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
